var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],
      [6, 22, 38],
      [6, 24, 42],
      [6, 26, 46],
      [6, 28, 50],
      [6, 30, 54],
      [6, 32, 58],
      [6, 34, 62],

<script>
// ===================== STORAGE (localStorage, no server, no login) =====================
const CUSTOMERS_KEY = 'khata_customers_list';
const txnKey = (id) => 'khata_txns_' + id;
const BACKUP_META_KEY = 'khata_last_backup';

function loadCustomers() {
  try { return JSON.parse(localStorage.getItem(CUSTOMERS_KEY) || '[]'); } catch { return []; }
}
function saveCustomers(list) { localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(list)); }
function loadTxns(id) {
  try { return JSON.parse(localStorage.getItem(txnKey(id)) || '[]'); } catch { return []; }
}
function saveTxns(id, list) { localStorage.setItem(txnKey(id), JSON.stringify(list)); }

// ---- Full backup / restore ----
function exportBackup() {
  const data = { customers: loadCustomers(), txns: {}, exportedAt: new Date().toISOString() };
  data.customers.forEach(c => { data.txns[c.id] = loadTxns(c.id); });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `rental-khata-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem(BACKUP_META_KEY, new Date().toISOString());
  showToast('Backup file downloaded');
}
function importBackupFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.customers) throw new Error('bad file');
      saveCustomers(data.customers);
      Object.keys(data.txns || {}).forEach(cid => saveTxns(cid, data.txns[cid]));
      localStorage.setItem(BACKUP_META_KEY, new Date().toISOString());
      showToast('Backup restored');
      state.customers = loadCustomers();
      render();
    } catch (err) {
      showToast('Invalid backup file');
    }
  };
  reader.readAsText(file);
}
function daysSinceBackup() {
  const last = localStorage.getItem(BACKUP_META_KEY);
  if (!last) return Infinity;
  return Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
}

// ===================== RECEIPT / BILL SHARING (Hindi, with logo, shared as image) =====================
const COMPANY_NAME_HI = 'अंकित कंस्ट्रक्शन';
const COMPANY_TAGLINE_HI = 'निर्माण सामग्री किराया सेवा';
const COMPANY_CARE_NUMBER = '9162831344';
const UPI_ID = '8521363342@sbi';
const UPI_PAYEE_NAME = 'Foolmani Kumari';

function buildUpiLink(amount, note){
  const amt = amount > 0 ? Number(amount).toFixed(2) : '';
  return `upi://pay?pa=${encodeURIComponent(UPI_ID)}&pn=${encodeURIComponent(UPI_PAYEE_NAME)}&am=${amt}&cu=INR&tn=${encodeURIComponent(note||'Rental payment')}`;
}

// Draw a QR code directly onto an existing canvas context (used for embedding in receipts)
function drawQrOnCanvas(ctx, data, x, y, size){
  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();
  const count = qr.getModuleCount();
  const cell = size / count;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x, y, size, size);
  ctx.fillStyle = '#000000';
  for (let r=0; r<count; r++){
    for (let c=0; c<count; c++){
      if (qr.isDark(r,c)) ctx.fillRect(x + c*cell, y + r*cell, Math.ceil(cell)+0.5, Math.ceil(cell)+0.5);
    }
  }
}

// Build a standalone QR image (data URL) for the on-screen "show to customer" modal
function buildQrDataUrl(data){
  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();
  return qr.createDataURL(8, 8);
}

function drawCompanyLogo(ctx, cx, cy, r){
  // Badge circle
  const grad = ctx.createLinearGradient(cx-r, cy-r, cx+r, cy+r);
  grad.addColorStop(0, '#b23a3a');
  grad.addColorStop(1, '#25344f');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.lineWidth = r*0.06;
  ctx.strokeStyle = '#f3ecd9';
  ctx.stroke();

  ctx.save();
  ctx.fillStyle = '#f3ecd9';
  ctx.strokeStyle = '#f3ecd9';

  // Building silhouette
  const bw = r*0.62, bh = r*1.0;
  const bx = cx - r*0.28, by = cy + r*0.42 - bh;
  ctx.fillRect(bx, by, bw, bh);

  // Windows (cut out in badge color to look like openings)
  ctx.fillStyle = '#dd6b5f';
  const cols=2, rows=3, pad=bw*0.16, winW=(bw-pad*3)/cols, winH=bh*0.14;
  for (let row=0; row<rows; row++){
    for (let col=0; col<cols; col++){
      const wx = bx + pad + col*(winW+pad);
      const wy = by + bh*0.12 + row*(winH+bh*0.08);
      ctx.fillRect(wx, wy, winW, winH);
    }
  }

  // Crane arm
  ctx.strokeStyle = '#f3ecd9';
  ctx.lineWidth = r*0.07;
  ctx.beginPath();
  ctx.moveTo(bx+bw*0.85, by);
  ctx.lineTo(bx+bw*0.85, cy - r*0.62);
  ctx.lineTo(cx + r*0.55, cy - r*0.62);
  ctx.stroke();
  // Crane hook line
  ctx.lineWidth = r*0.035;
  ctx.beginPath();
  ctx.moveTo(cx + r*0.4, cy - r*0.62);
  ctx.lineTo(cx + r*0.4, cy - r*0.3);
  ctx.stroke();

  ctx.restore();
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, align){
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (let n=0; n<words.length; n++){
    const test = line + words[n] + ' ';
    if (ctx.measureText(test).width > maxWidth && n > 0){
      lines.push(line.trim()); line = words[n] + ' ';
    } else line = test;
  }
  lines.push(line.trim());
  lines.forEach((l,i)=>{ ctx.fillText(l, x, y + i*lineHeight); });
  return y + lines.length*lineHeight;
}

function drawReceiptContent(ctx, W, H, c, entries, isBill){
  ctx.fillStyle = '#f7f2e7';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(37,52,79,0.3)';
  ctx.lineWidth = 3;
  ctx.strokeRect(14,14,W-28,H-28);

  drawCompanyLogo(ctx, W/2, 100, 62);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#25344f';
  ctx.font = "bold 40px 'Noto Sans Devanagari', sans-serif";
  ctx.fillText(COMPANY_NAME_HI, W/2, 205);
  ctx.font = "18px 'Noto Sans Devanagari', sans-serif";
  ctx.fillStyle = '#8b7355';
  ctx.fillText(COMPANY_TAGLINE_HI, W/2, 232);
  ctx.font = "16px 'Noto Sans Devanagari', sans-serif";
  ctx.fillText(isBill ? 'किराया बिल (Rental Bill)' : 'किराया रसीद (Rental Receipt)', W/2, 258);

  ctx.strokeStyle = 'rgba(37,52,79,0.25)';
  ctx.beginPath(); ctx.moveTo(50,282); ctx.lineTo(W-50,282); ctx.stroke();

  let y = 320;
  const rowH = 34;
  ctx.textAlign = 'left';

  function line(label, value, opts={}){
    ctx.font = opts.bold ? "bold 22px 'Noto Sans Devanagari', sans-serif" : "20px 'Noto Sans Devanagari', sans-serif";
    ctx.fillStyle = opts.color || '#25344f';
    ctx.textAlign = 'left';
    ctx.fillText(label, 50, y);
    ctx.textAlign = 'right';
    ctx.fillText(value, W-50, y);
    ctx.textAlign = 'left';
    y += opts.gap || 34;
  }
  function divider(){
    ctx.strokeStyle='rgba(37,52,79,0.2)';
    ctx.beginPath(); ctx.moveTo(50,y); ctx.lineTo(W-50,y); ctx.stroke();
    y += 30;
  }

  line('ग्राहक का नाम:', c.name);
  if (c.phone) line('फ़ोन नंबर:', c.phone);
  if (c.address) line('पता:', c.address);
  divider();

  let grandTotal=0, grandPaid=0;

  if (isBill){
    ctx.font="bold 20px 'Noto Sans Devanagari', sans-serif";
    ctx.fillStyle='#25344f';
    ctx.fillText('किराया विवरण (Entries)', 50, y);
    y += 32;
    entries.forEach((t, idx) => {
      const m = txnMath(t);
      grandTotal += m.total; grandPaid += m.paid;
      const isSettled = m.due <= 0 && !m.notYetStarted;

}

function buildReceiptCanvas(c, entries, isBill){
  const W = 800;

  // Pass 1: draw onto a generously tall scratch canvas purely to measure the real content height
  // (the number of lines varies with phone/address/items/payments, so a fixed-height guess isn't reliable)
  const scratch = document.createElement('canvas');
  scratch.width = W; scratch.height = 3000;
  const measuredH = drawReceiptContent(scratch.getContext('2d'), W, 3000, c, entries, isBill);

  // Pass 2: draw again onto a canvas sized exactly to fit, so nothing gets cut off at the bottom
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = measuredH;
  drawReceiptContent(canvas.getContext('2d'), W, measuredH, c, entries, isBill);

  return canvas;
}

async function shareCanvasAsImage(canvas, filename, title){
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  const file = new File([blob], filename, { type: 'image/png' });
  if (navigator.canShare && navigator.canShare({ files: [file] })){
    try { await navigator.share({ files: [file], title }); return; } catch(e){ /* cancelled */ return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('रसीद डाउनलोड हुई — WhatsApp में भेजें');
}

// ===================== DATE HELPERS =====================
function nowLocalInput() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function nowISO(){ return new Date().toISOString(); }
function daysBetween(a,b){
  // Plain calendar-date subtraction. e.g. 11 Jul -> 20 Jul = 9 days, regardless of what time
  // it was picked up or returned — no extra day added for crossing into the next day late.
  const d1 = new Date(a);
  const d2 = new Date(b);
  if (d1 > d2) return 0; // rental hasn't started yet (given date is in the future)
  const date1 = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
  const date2 = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
  const diff = Math.round((date2 - date1) / 86400000);
  return Math.max(diff, 1);
}
function dateOnlyDate(d){
  const dt = new Date(d);
  return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
}
function dateOnlyKey(d){
  const dt = new Date(d);
  return `${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
}
function fmtDateTime(d){
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// A calendar day only "properly starts" once it's past noon — checking early in the morning
// shouldn't yet count that day as billable. Never shifts back to or before the given date itself.
function billingEndDate(rawDate, givenD){
  const raw = dateOnlyDate(rawDate);
  if (dateOnlyKey(raw) === dateOnlyKey(givenD)) return raw;
  if (new Date(rawDate).getHours() < 12){
    const shifted = new Date(raw);
    shifted.setDate(shifted.getDate() - 1);
    return shifted < givenD ? givenD : shifted;
  }
  return raw;
}

// ===================== MONEY CALC =====================
// Two different billing models:
//  - "Simple" (plain subtraction): used for Plate(3x2'), Bamboo/Balli, Channel — but ONLY when
//    all three appear together in the same entry (the shuttering combo). e.g. 11->20 Jul = 9 days flat.
//  - "Level-based" (day-by-day): used for everything else, and for those same three products
//    whenever they're NOT all rented together as a combo. Each calendar day is billed at whatever
//    quantity was actually held that day — a partial return's day already counts at the reduced qty.
function isComboProduct(productName){
  if (productName === 'Bamboo / Balli') return true;
  if (productName === 'Channel') return true;
  if (productName.startsWith('Plate (') && productName.includes('3×2')) return true;
  return false;
}

function simpleItemMath(item, dateGiven, nowFallback){
  const returns = (item.returns||[]).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));
  let remaining = Number(item.qty);
  let total = 0;
  returns.forEach(r=>{
    const qtyThis = Math.min(Number(r.qty), remaining);
    if (qtyThis <= 0) return;
    const days = daysBetween(dateGiven, r.date);
    total += qtyThis * Number(item.rate) * days;
    remaining -= qtyThis;
  });
  if (remaining > 0){
    const days = daysBetween(dateGiven, nowFallback);
    total += remaining * Number(item.rate) * days;
  }
  return { total, remaining, returnedQty: Number(item.qty) - remaining, returns };
}

function levelBasedItemMath(item, dateGiven, nowFallback){
  const totalQty = Number(item.qty);
  const returns = (item.returns||[]).slice().sort((a,b)=> new Date(a.date)-new Date(b.date));
  const sumReturned = returns.reduce((s,r)=> s + Number(r.qty), 0);
  const remaining = Math.max(totalQty - sumReturned, 0);

  const givenD = dateOnlyDate(dateGiven);
  const endD = (remaining<=0 && returns.length>0) ? billingEndDate(returns[returns.length-1].date, givenD) : billingEndDate(nowFallback, givenD);

  if (givenD > endD){
    return { total: 0, remaining, returnedQty: totalQty-remaining, returns };
  }

  const givenKey = dateOnlyKey(givenD);
  const changesByDate = {};
  returns.forEach(r=>{
    let effectiveDate = dateOnlyDate(r.date);
    // A return on the SAME calendar day it was given doesn't reduce that founding day's billing —
    // the founding day always counts at the full quantity that was actually handed over.
    // The reduction takes effect starting the next day instead.
    if (dateOnlyKey(effectiveDate) === givenKey){
      effectiveDate = new Date(effectiveDate);
      effectiveDate.setDate(effectiveDate.getDate() + 1);
    }
    const key = dateOnlyKey(effectiveDate);
    changesByDate[key] = (changesByDate[key]||0) + Number(r.qty);
  });

  let currentQty = totalQty;
  let total = 0;
  const cursor = new Date(givenD);
  let iterations = 0;
  while (cursor <= endD && iterations < 20000){
    const key = dateOnlyKey(cursor);
    if (changesByDate[key]) currentQty = Math.max(currentQty - changesByDate[key], 0);
    total += currentQty * Number(item.rate);
    cursor.setDate(cursor.getDate()+1);
    iterations++;
  }
  return { total, remaining, returnedQty: totalQty-remaining, returns };
}

function txnMath(t){
  const now = nowISO();
  const rawItems = t.items||[];
  const hasPlate32 = rawItems.some(i=> i.product.startsWith('Plate (') && i.product.includes('3×2'));
  const hasBamboo = rawItems.some(i=> i.product==='Bamboo / Balli');
  const hasChannel = rawItems.some(i=> i.product==='Channel');
  const comboActive = hasPlate32 && (hasBamboo || hasChannel); // Plate(3x2') + Bamboo, or Plate(3x2') + Channel, or all three — any of these trigger the simple rule

  const items = rawItems.map(item=>{
    const useSimple = comboActive && isComboProduct(item.product);
    const im = useSimple ? simpleItemMath(item, t.dateGiven, now) : levelBasedItemMath(item, t.dateGiven, now);
    return { ...item, ...im };
  });
  const perDayCost = items.reduce((s,i)=> s + Number(i.qty)*Number(i.rate), 0);
  const manualDays = (t.manualDays != null && Number(t.manualDays) > 0) ? Number(t.manualDays) : null;
  const total = manualDays != null ? perDayCost * manualDays : items.reduce((s,i)=> s + i.total, 0);
  const allReturned = items.length>0 && items.every(i=> i.remaining<=0);
  const anyReturned = items.some(i=> i.returnedQty>0);
  const notYetStarted = new Date(t.dateGiven) > new Date(now);
  const status = notYetStarted ? 'booked' : allReturned ? 'returned' : anyReturned ? 'partial' : 'ongoing';
  // Kept for places that still want a single "days" figure — based on overall span so far
  const days = manualDays != null ? manualDays : daysBetween(t.dateGiven, now);
  const paidExtra = (t.payments||[]).reduce((s,p)=> s + Number(p.amount), 0);
  const waived = Number(t.waived||0);
  const paid = Number(t.advance||0) + paidExtra + waived;
  const due = total - paid;
  return { days, perDayCost, total, paid, due, items, status, allReturned, manualDays, waived, notYetStarted };
}

// ===================== CALCULATOR ENGINE =====================
function evalExpr(expr){
  if (!expr) return 0;
  const tokens = expr.match(/(\d+\.?\d*)|[+\-*/()]/g);
  if (!tokens) return 0;
  let pos = 0;
  const peek = () => tokens[pos];
  const next = () => tokens[pos++];
  function parseExpr(){ let v=parseTerm(); while(peek()==='+'||peek()==='-'){const op=next(); const r=parseTerm(); v = op==='+'? v+r : v-r;} return v; }
  function parseTerm(){ let v=parseFactor(); while(peek()==='*'||peek()==='/'){const op=next(); const r=parseFactor(); v = op==='*'? v*r : v/r;} return v; }
  function parseFactor(){
    if (peek()==='('){ next(); const v=parseExpr(); if(peek()===')') next(); return v; }
    if (peek()==='-'){ next(); return -parseFactor(); }
    return parseFloat(next());
  }
  try { const r = parseExpr(); return isFinite(r)? r : 0; } catch { return 0; }
}

function summarizeOutstanding(txns){
  if (txns.length===0) return null; // no entries at all yet — show nothing
  const totals = {};
  const bookedTotals = {};
  txns.forEach(t=>{
    const m = txnMath(t);
    m.items.forEach(i=>{
      if (i.remaining <= 0) return;
      if (m.notYetStarted) bookedTotals[i.product] = (bookedTotals[i.product]||0) + i.remaining;
      else totals[i.product] = (totals[i.product]||0) + i.remaining;
    });
  });
  const parts = Object.entries(totals).map(([product,qty]) => `${product} ×${qty}`);
  const bookedParts = Object.entries(bookedTotals).map(([product,qty]) => `${product} ×${qty}`);
  if (parts.length===0 && bookedParts.length===0) return { text: 'All returned', color: 'text-[#2f6b4f]' };
  const lines = [];
  if (parts.length>0) {
    const text = parts.join(', ');
    lines.push({ text: text.length>60 ? text.slice(0,58)+'…' : text, color: 'text-[#c2703d]', prefix: '📦 Out: ' });
  }
  if (bookedParts.length>0) {
    const text = bookedParts.join(', ');
    lines.push({ text: text.length>60 ? text.slice(0,58)+'…' : text, color: 'text-[#2a5a8c]', prefix: '📅 Booked: ' });
  }
  return lines;
}

function renderCustomerListBody(){
  const filtered = state.customers.filter(c=>c.name.toLowerCase().includes(state.search.toLowerCase()));
  const dues = {};
  const outstanding = {};
  filtered.forEach(c=>{
    const t = loadTxns(c.id);
    dues[c.id] = t.reduce((s,tx)=> s + txnMath(tx).due, 0);
    outstanding[c.id] = summarizeOutstanding(t);
  });
  if (filtered.length===0) {
    return `<div class="text-center text-[#8b7355] mt-16 px-6 ml-2">
      <p class="ink text-lg">Khaali panna — page is empty</p>

    </div>`;
  }
  return `<div class="space-y-1 ml-2">
    ${filtered.map(c=>{
      const due = dues[c.id] ?? 0;
      const dueTxt = due>0 ? `₹${due.toLocaleString('en-IN')} due` : due<0 ? `₹${Math.abs(due).toLocaleString('en-IN')} adv` : 'Clear';
      const dueColor = due>0 ? 'text-[#b23a3a]' : due<0 ? 'text-[#2f6b4f]' : 'text-[#8b7355]';
      const out = outstanding[c.id];
      const outLines = !out ? '' : Array.isArray(out)
        ? out.map(l => `<p class="text-[11px] ${l.color} mt-0.5">${l.prefix}${esc(l.text)}</p>`).join('')
        : `<p class="text-[11px] ${out.color} mt-0.5">✓ All returned</p>`;
      return `
      <button data-open-customer="${c.id}" class="w-full flex items-center justify-between border-b border-dashed border-[#25344f]/25 px-2 py-3 text-left active:bg-[#25344f]/5">

}

// ---------- Add Transaction ----------
function initTxnForm(){
  const simpleQty = {}, simpleRate = {};
  PRODUCT_CONFIG.forEach(p=>{ if(!p.sizes){ simpleQty[p.name]=''; simpleRate[p.name]=p.defaultRate||''; } });
  const sizeRows = {};
  PRODUCT_CONFIG.forEach(p=>{ if(p.sizes){ sizeRows[p.name] = p.sizes.map((label,i)=>({id:p.name+'-'+i,label,qty:'',rate:p.defaultRate||''})); } });
  txnForm = { simpleQty, simpleRate, customName:'', sizeRows, dateGiven: nowLocalInput(), hasReturnDate:false, dateReturned: nowLocalInput(), advance:'', manualDays:'' };
}

function computeTxnItems(){
  const items = [];
  PRODUCT_CONFIG.forEach(p=>{
    if (p.sizes){
      (txnForm.sizeRows[p.name]||[]).forEach(row=>{
        const qty = Number(row.qty||0);
        if (qty>0 && row.label.trim()) items.push({ product:`${p.name} (${row.label.trim()})`, qty, rate:Number(row.rate||0) });
      });
    } else if (p.name!=='Other'){
      const qty = Number(txnForm.simpleQty[p.name]||0);
      if (qty>0) items.push({ product:p.name, qty, rate:Number(txnForm.simpleRate[p.name]||0) });
    }
  });
  const otherQty = Number(txnForm.simpleQty['Other']||0);
  if (otherQty>0 && txnForm.customName.trim()) items.push({ product:txnForm.customName.trim(), qty:otherQty, rate:Number(txnForm.simpleRate['Other']||0) });
  return items;
}

function buildAddPreviewTxn(){
  const rawItems = computeTxnItems();
  const items = rawItems.map(i => ({
    ...i,
    returns: txnForm.hasReturnDate ? [{ qty: i.qty, date: txnForm.dateReturned }] : []
  }));
  return { dateGiven: txnForm.dateGiven, items, payments: [], advance: 0, waived: 0, manualDays: txnForm.manualDays ? Number(txnForm.manualDays) : null };
}

function renderTxnPreviewBlock(){
  const items = computeTxnItems();
  if (items.length===0) return '';
  const m = txnMath(buildAddPreviewTxn());
  const dayLabel = m.manualDays!=null ? 'Days (manually set)' : (txnForm.hasReturnDate?'Days on rent':'Days so far (ongoing)');
  return `
      <div class="border-2 border-[#25344f]/20 rounded-lg p-4 mb-6 bg-[#fbf7ec]/60">
        <div class="flex justify-between text-xs text-[#8b7355] mb-1"><span>Cost per day (all items)</span><span class="mono text-[#25344f]">₹${m.perDayCost.toLocaleString('en-IN')}</span></div>
        <div class="flex justify-between text-xs text-[#8b7355] mb-1"><span>${dayLabel}</span><span class="mono text-[#25344f]">${m.days}d</span></div>
        <div class="flex justify-between text-sm font-bold pt-2 border-t border-dashed border-[#25344f]/20 mt-2"><span class="text-[#25344f]">Total</span><span class="mono text-[#b23a3a]">₹${m.total.toLocaleString('en-IN')}</span></div>
      </div>`;
}

  const slot = document.getElementById('txn-preview-slot');

}

    </div>
  </div>`;
}

// ---------- Edit Transaction ----------
function initEditTxnForm(t){
  editTxnForm = {
    txnId: t.id,
    items: t.items.map((it,i)=>({ id:'ei'+i, product:it.product, qty:String(it.qty), rate:String(it.rate), returns: it.returns||[] })),
    dateGiven: t.dateGiven,
    advance: String(t.advance||0),
    manualDays: t.manualDays!=null ? String(t.manualDays) : '',
  };
}

function computeEditItems(){
  return editTxnForm.items
    .filter(row => Number(row.qty||0) > 0 && row.product.trim())
    .map(row => ({ product: row.product.trim(), qty: Number(row.qty), rate: Number(row.rate||0), returns: row.returns||[] }));
}

function renderEditPreviewBlock(){
  const items = computeEditItems();
  if (items.length===0) return '';
  const fakeTxn = { dateGiven: editTxnForm.dateGiven, items, payments: [], advance: 0, waived: 0, manualDays: editTxnForm.manualDays ? Number(editTxnForm.manualDays) : null };
  const m = txnMath(fakeTxn);
  return `
      <div class="border-2 border-[#25344f]/20 rounded-lg p-4 mb-6 bg-[#fbf7ec]/60">
        <div class="flex justify-between text-xs text-[#8b7355] mb-1"><span>${m.manualDays!=null?'Days (manually set)':'Days so far'}</span><span class="mono text-[#25344f]">${m.days}d</span></div>
        <div class="flex justify-between text-sm font-bold pt-2 border-t border-dashed border-[#25344f]/20 mt-2"><span class="text-[#25344f]">Total so far (before advance/payments)</span><span class="mono text-[#b23a3a]">₹${m.total.toLocaleString('en-IN')}</span></div>
      </div>`;
}

function updateEditLive(){
  const slot = document.getElementById('edit-preview-slot');
  if (slot) slot.innerHTML = renderEditPreviewBlock();
  const saveBtn = document.getElementById('btn-save-edit');
  if (saveBtn) {
    const items = computeEditItems();
    saveBtn.disabled = items.length===0;
    saveBtn.classList.toggle('opacity-40', items.length===0);
  }
}

function renderCalculator(){
  const keys = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','⌫','+'];
  return `
  <div class="px-5 ml-2">
    <div class="border-2 border-[#25344f]/20 rounded-lg p-5 mb-4 min-h-[100px] flex flex-col justify-end bg-[#fbf7ec]/60">
      <p class="text-[#8b7355] text-sm mono break-all text-right">${esc(calcState.expr || '0')}</p>
      ${calcState.result!==null ? `<p class="text-2xl font-bold mono mt-1 text-right text-[#25344f]">${calcState.result}</p>` : ''}
    </div>
    <div class="grid grid-cols-4 gap-2">
      ${keys.map(k=>`<button data-calc-key="${k}" class="py-4 rounded-lg text-lg font-medium mono ${['/','*','-','+'].includes(k)?'bg-[#25344f]/10 text-[#b23a3a]':k==='⌫'?'bg-[#25344f]/10 text-[#25344f]':'bg-[#fbf7ec] border border-[#25344f]/20 text-[#25344f]'}">${k}</button>`).join('')}
    </div>
    <div class="grid grid-cols-2 gap-2 mt-2">
      <button data-calc-key="C" class="py-4 rounded-lg bg-[#25344f]/10 text-[#9b4a3a] font-semibold">Clear</button>
      <button data-calc-key="=" class="py-4 rounded-lg bg-[#b23a3a] text-[#fbf7ec] font-bold">=</button>
    </div>
  </div>`;
}

// ===================== EVENT HANDLERS =====================
function attachHandlers(){
  const $ = sel => document.querySelector(sel);
  const $$ = sel => document.querySelectorAll(sel);

  $('#nav-customers')?.addEventListener('click', ()=>{ state.tab='customers'; state.screen='list'; render(); });
  $('#nav-calc')?.addEventListener('click', ()=>{ state.tab='calc'; render(); });
  $('#btn-back')?.addEventListener('click', ()=>{
    if (state.screen==='add-txn' || state.screen==='edit-txn') { txnForm=null; editTxnForm=null; state.screen='customer'; }
    else if (state.screen==='edit-customer') { editCustForm=null; state.screen='customer'; }
    else if (state.screen==='customer' || state.screen==='add-customer') { state.screen='list'; }
    else { state.screen = state.tab==='calc' ? 'calc' : 'list'; }
    render();
  });

  $('#btn-export')?.addEventListener('click', exportBackup);
  $('#import-file')?.addEventListener('change', (e)=>{ if(e.target.files[0]) importBackupFile(e.target.files[0]); });

  $('#search-input')?.addEventListener('input', (e)=>{
    state.search = e.target.value;
    const body = document.getElementById('customer-list-body');
    if (body) { body.innerHTML = renderCustomerListBody(); bindOpenCustomerButtons(); }
  });

  $$('[data-open-customer]').forEach(b=> b.addEventListener('click', ()=>{
    state.activeCustomerId = b.getAttribute('data-open-customer');
    state.txns = loadTxns(state.activeCustomerId);
    state.openTxnId = null;
    state.screen = 'customer';
    render();
  }));

  $('#btn-add-customer')?.addEventListener('click', ()=>{ custForm={name:'',phone:'',address:''}; state.screen='add-customer'; render(); });
  $('#btn-cancel-customer')?.addEventListener('click', ()=>{ state.screen='list'; render(); });
  $('#f-name')?.addEventListener('input', e=>custForm.name=e.target.value);
  $('#f-phone')?.addEventListener('input', e=>custForm.phone=e.target.value);
  $('#f-address')?.addEventListener('input', e=>custForm.address=e.target.value);
  $('#btn-save-customer')?.addEventListener('click', ()=>{
    if(!custForm.name.trim()) return;
    const c = { id:'c'+Date.now(), name:custForm.name.trim(), phone:custForm.phone.trim(), address:custForm.address.trim() };
    state.customers = [...state.customers, c];
    saveCustomers(state.customers);
    state.screen='list';
    showToast(c.name + ' added to khata');
  });

  $('#btn-add-txn')?.addEventListener('click', ()=>{ initTxnForm(); state.screen='add-txn'; render(); });

  $('#btn-share-khata')?.addEventListener('click', async ()=>{
    const c = getActiveCustomer();
    try { await Promise.all([
      document.fonts.load("bold 40px 'Noto Sans Devanagari'"),
      document.fonts.load("18px 'Noto Sans Devanagari'"),
    ]); } catch(e) {}
    const canvas = buildReceiptCanvas(c, state.txns, true);
    shareCanvasAsImage(canvas, `bill-${c.name.replace(/\s+/g,'-')}.png`, `Bill — ${c.name}`);
  });

  $('#btn-whatsapp-customer')?.addEventListener('click', async ()=>{
    const c = getActiveCustomer();
    try { await Promise.all([
      document.fonts.load("bold 40px 'Noto Sans Devanagari'"),
      document.fonts.load("18px 'Noto Sans Devanagari'"),
    ]); } catch(e) {}
    const canvas = buildReceiptCanvas(c, state.txns, true);
    shareCanvasAsImage(canvas, `bill-${c.name.replace(/\s+/g,'-')}.png`, `Bill — ${c.name}`);
  });

  $('#btn-show-qr')?.addEventListener('click', ()=>{
    const c = getActiveCustomer();
    const totals = state.txns.reduce((acc,t)=>{ const m=txnMath(t); acc.due+=m.due; return acc; }, {due:0});
    if (totals.due<=0) return;
    showQrModal(totals.due, `${c.name} - Rental`);
  });
  $('#btn-close-qr')?.addEventListener('click', closeQrModal);
  $('#qr-modal-backdrop')?.addEventListener('click', (e)=>{ if (e.target.id==='qr-modal-backdrop') closeQrModal(); });

  $$('[data-share-txn]').forEach(b=> b.addEventListener('click', async ()=>{
    const id = b.getAttribute('data-share-txn');
    const t = state.txns.find(x=>x.id===id);
    const c = getActiveCustomer();
    if (!t || !c) return;
    try { await Promise.all([
      document.fonts.load("bold 40px 'Noto Sans Devanagari'"),
      document.fonts.load("18px 'Noto Sans Devanagari'"),
    ]); } catch(e) {}
    const canvas = buildReceiptCanvas(c, [t], false);
    shareCanvasAsImage(canvas, `receipt-${c.name.replace(/\s+/g,'-')}.png`, `Receipt — ${c.name}`);
  }));
  $('#btn-cancel-txn')?.addEventListener('click', ()=>{ txnForm=null; state.screen='customer'; render(); });
  $('#btn-delete-customer')?.addEventListener('click', ()=>{
    if(!confirm('Delete this customer and their khata?')) return;
    state.customers = state.customers.filter(c=>c.id!==state.activeCustomerId);
    saveCustomers(state.customers);
    state.screen='list';
    showToast('Customer removed');
  });

  $('#btn-edit-customer')?.addEventListener('click', ()=>{
    const c = getActiveCustomer();
    if (!c) return;
    initEditCustForm(c);
    state.screen = 'edit-customer';
    render();
  });
  $('#ef-name')?.addEventListener('input', e=>{ editCustForm.name = e.target.value; });
  $('#ef-phone')?.addEventListener('input', e=>{ editCustForm.phone = e.target.value; });
  $('#ef-address')?.addEventListener('input', e=>{ editCustForm.address = e.target.value; });
  $('#btn-cancel-edit-customer')?.addEventListener('click', ()=>{ editCustForm=null; state.screen='customer'; render(); });
  $('#btn-save-edit-customer')?.addEventListener('click', ()=>{
    if (!editCustForm.name.trim()) return;
    const idx = state.customers.findIndex(c=>c.id===editCustForm.id);
    if (idx===-1) return;
    state.customers[idx] = {
      ...state.customers[idx],
      name: editCustForm.name.trim(),
      phone: editCustForm.phone.trim(),
      address: editCustForm.address.trim(),
    };
    saveCustomers(state.customers);
    editCustForm = null;
    state.screen = 'customer';
    showToast('Customer details updated');
  });

  $$('[data-toggle-txn]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-toggle-txn');
    state.openTxnId = state.openTxnId===id ? null : id;
    render();
  }));

  $$('[data-add-payment]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-add-payment');
    const input = document.getElementById('pay-amt-'+id);
    const amt = parseFloat(input.value);
    if (!amt || amt<=0) return;
    const t = state.txns.find(x=>x.id===id);
    t.payments = [...(t.payments||[]), { amount:amt, date: nowISO() }];
    t.history = [...(t.history||[]), { ts: nowISO(), note: `Payment ₹${amt.toLocaleString('en-IN')} recorded` }];
    saveTxns(state.activeCustomerId, state.txns);
    showToast(`₹${amt.toLocaleString('en-IN')} payment added`);
  }));

  $$('[data-return-item]').forEach(b=> b.addEventListener('click', ()=>{
    const [txnId, idxStr] = b.getAttribute('data-return-item').split('|');
    const idx = Number(idxStr);
    const t = state.txns.find(x=>x.id===txnId);
    if (!t || !t.items[idx]) return;
    const qtyInput = document.getElementById(`ret-qty-${txnId}-${idx}`);
    const dateInput = document.getElementById(`ret-date-${txnId}-${idx}`);
    const item = t.items[idx];
    const alreadyReturned = (item.returns||[]).reduce((s,r)=>s+Number(r.qty),0);
    const remaining = Number(item.qty) - alreadyReturned;
    const qty = Math.min(Math.max(Number(qtyInput.value)||0, 0), remaining);
    if (qty <= 0) { showToast('Enter a valid quantity'); return; }
    item.returns = [...(item.returns||[]), { qty, date: dateInput.value }];
    t.history = [...(t.history||[]), { ts: nowISO(), note: `${qty} × ${item.product} returned ${fmtDateTime(dateInput.value)}${remaining-qty>0 ? ` (${remaining-qty} still out)` : ' (fully returned)'}` }];
    saveTxns(state.activeCustomerId, state.txns);
    showToast(remaining-qty>0 ? `${qty} returned, ${remaining-qty} still out` : `${qty} returned — fully closed`);
  }));

  $$('[data-mark-given]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-mark-given');
    const t = state.txns.find(x=>x.id===id);
    if (!t) return;
    const oldGiven = t.dateGiven;
    t.dateGiven = nowLocalInput();
    t.history = [...(t.history||[]), { ts: nowISO(), note: `Marked as given now — billing starts from ${fmtDateTime(t.dateGiven)} (was booked for ${fmtDateTime(oldGiven)})` }];
    saveTxns(state.activeCustomerId, state.txns);
    showToast('Marked as given — billing has started');
  }));

  $$('[data-settle-txn]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-settle-txn');
    const t = state.txns.find(x=>x.id===id);
    if (!t) return;
    const m = txnMath(t);
    if (m.due<=0) return;
    if (!confirm(`Waive the remaining ₹${m.due.toLocaleString('en-IN')} and mark this entry as fully settled?`)) return;
    t.waived = Number(t.waived||0) + m.due;
    t.history = [...(t.history||[]), { ts: nowISO(), note: `₹${m.due.toLocaleString('en-IN')} waived — marked as fully settled` }];
    saveTxns(state.activeCustomerId, state.txns);
    showToast('Marked as settled');
  }));

  $$('[data-delete-txn]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-delete-txn');
    if(!confirm('Delete this entry?')) return;
    state.txns = state.txns.filter(x=>x.id!==id);
    saveTxns(state.activeCustomerId, state.txns);
    showToast('Entry deleted');
  }));

  $$('[data-edit-txn]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-edit-txn');
    const t = state.txns.find(x=>x.id===id);
    if (!t) return;
    initEditTxnForm(t);
    state.screen = 'edit-txn';
    render();
  }));

  // Edit Txn form field bindings — patch only the preview, never re-render inputs (keeps numeric keypad open)
  $$('[data-ei-prod]').forEach(inp=> inp.addEventListener('input', e=>{
    const row = editTxnForm.items.find(r=>r.id===inp.getAttribute('data-ei-prod')); row.product = e.target.value; updateEditLive();
  }));
  $$('[data-ei-qty]').forEach(inp=> inp.addEventListener('input', e=>{
    const row = editTxnForm.items.find(r=>r.id===inp.getAttribute('data-ei-qty')); row.qty = e.target.value; updateEditLive();
  }));
  $$('[data-ei-rate]').forEach(inp=> inp.addEventListener('input', e=>{
    const row = editTxnForm.items.find(r=>r.id===inp.getAttribute('data-ei-rate')); row.rate = e.target.value; updateEditLive();
  }));
  $$('[data-ei-remove]').forEach(b=> b.addEventListener('click', ()=>{
    const id = b.getAttribute('data-ei-remove');
    editTxnForm.items = editTxnForm.items.filter(r=>r.id!==id);
    render();
  }));
  $('#btn-ei-add')?.addEventListener('click', ()=>{
    editTxnForm.items.push({ id:'ei'+Date.now(), product:'', qty:'', rate:'', returns:[] });
    render();
  });

  $('#ei-date-given')?.addEventListener('input', e=>{ editTxnForm.dateGiven = e.target.value; updateEditLive(); });
  $('#ei-manual-days')?.addEventListener('input', e=>{ editTxnForm.manualDays = e.target.value; updateEditLive(); });
  $('#ei-advance')?.addEventListener('input', e=>{ editTxnForm.advance = e.target.value; });

  $('#btn-cancel-edit')?.addEventListener('click', ()=>{ editTxnForm=null; state.screen='customer'; render(); });

  $('#btn-save-edit')?.addEventListener('click', ()=>{
    const items = computeEditItems();
    if (items.length===0) return;
    const t = state.txns.find(x=>x.id===editTxnForm.txnId);
    if (!t) return;
    t.items = items;
    t.dateGiven = editTxnForm.dateGiven;
    t.advance = Number(editTxnForm.advance||0);
    t.manualDays = editTxnForm.manualDays ? Number(editTxnForm.manualDays) : null;
    t.history = [...(t.history||[]), { ts: nowISO(), note: `Entry edited — ${items.map(i=>`${i.product} ×${i.qty}`).join(', ')}` }];
    saveTxns(state.activeCustomerId, state.txns);
    editTxnForm = null;
    state.screen = 'customer';
    showToast('Entry updated');
  });

  // Add Txn form field bindings — update state + patch only the preview, never re-render the inputs themselves
  $$('[data-simple-qty]').forEach(inp=> inp.addEventListener('input', e=>{ txnForm.simpleQty[inp.getAttribute('data-simple-qty')] = e.target.value; updateTxnLive(); }));
  $$('[data-simple-rate]').forEach(inp=> inp.addEventListener('input', e=>{ txnForm.simpleRate[inp.getAttribute('data-simple-rate')] = e.target.value; updateTxnLive(); }));
  $('#tf-other-name')?.addEventListener('input', e=>{ txnForm.customName = e.target.value; updateTxnLive(); });

  $$('[data-size-label]').forEach(inp=> inp.addEventListener('input', e=>{
    const [prod,id] = inp.getAttribute('data-size-label').split('|');
    const row = txnForm.sizeRows[prod].find(r=>r.id===id); row.label = e.target.value; updateTxnLive();
  }));
  $$('[data-size-qty]').forEach(inp=> inp.addEventListener('input', e=>{
    const [prod,id] = inp.getAttribute('data-size-qty').split('|');
    const row = txnForm.sizeRows[prod].find(r=>r.id===id); row.qty = e.target.value; updateTxnLive();
  }));
  $$('[data-size-rate]').forEach(inp=> inp.addEventListener('input', e=>{
    const [prod,id] = inp.getAttribute('data-size-rate').split('|');
    const row = txnForm.sizeRows[prod].find(r=>r.id===id); row.rate = e.target.value; updateTxnLive();
  }));
  $$('[data-remove-size]').forEach(b=> b.addEventListener('click', ()=>{
    const [prod,id] = b.getAttribute('data-remove-size').split('|');
    txnForm.sizeRows[prod] = txnForm.sizeRows[prod].filter(r=>r.id!==id);
    render();
  }));
  $$('[data-add-size]').forEach(b=> b.addEventListener('click', ()=>{
    const prod = b.getAttribute('data-add-size');
    txnForm.sizeRows[prod].push({ id: prod+'-c'+Date.now(), label:'', qty:'', rate:'' });
    render();
  }));

  $('#tf-date-given')?.addEventListener('input', e=>{ txnForm.dateGiven = e.target.value; updateTxnLive(); });
  $('#tf-date-returned')?.addEventListener('input', e=>{ txnForm.dateReturned = e.target.value; updateTxnLive(); });
  $('#tf-toggle-return')?.addEventListener('click', ()=>{ txnForm.hasReturnDate = !txnForm.hasReturnDate; render(); });
  $('#tf-manual-days')?.addEventListener('input', e=>{ txnForm.manualDays = e.target.value; updateTxnLive(); });
  $('#tf-advance')?.addEventListener('input', e=>{ txnForm.advance = e.target.value; });

  $('#btn-save-txn')?.addEventListener('click', ()=>{
    const rawItems = computeTxnItems();
    if (rawItems.length===0) return;
    const items = rawItems.map(i => ({
      ...i,
      returns: txnForm.hasReturnDate ? [{ qty: i.qty, date: txnForm.dateReturned }] : []
    }));
    const t = {
      id: 't'+Date.now(),
      items,
      dateGiven: txnForm.dateGiven,
      advance: Number(txnForm.advance||0),
      manualDays: txnForm.manualDays ? Number(txnForm.manualDays) : null,
      payments: [],
      waived: 0,
      history: [{ ts: nowISO(), note: `Entry created — ${items.map(i=>`${i.product} ×${i.qty}`).join(', ')}` }],
    };
    state.txns = [...state.txns, t];
    saveTxns(state.activeCustomerId, state.txns);
    txnForm = null;
    state.screen = 'customer';
    showToast('Entry written to ledger');
  });

  // Calculator
  $$('[data-calc-key]').forEach(b=> b.addEventListener('click', ()=>{
    const k = b.getAttribute('data-calc-key');
    if (k==='C'){ calcState.expr=''; calcState.result=null; }
    else if (k==='⌫'){ calcState.expr = calcState.expr.slice(0,-1); }
    else if (k==='='){ const r = evalExpr(calcState.expr); calcState.result=r; calcState.expr=String(r); }
    else { calcState.expr += k; calcState.result=null; }
    render();
  }));
}

// Lightweight re-render that preserves focus for text inputs while typing in Add Txn form
function renderLive(){
  // re-render but keep same screen; full render is cheap enough for this app size
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && active.selectionStart;
  render();
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) { el.focus(); if (selStart!=null && el.setSelectionRange) { try{ el.setSelectionRange(selStart, selStart);}catch{} } }
  }
}

render();
</script>
</body>
</html>
